kind = "mobile"
previewPath = "/"
title = "Nook"
version = "1.0.0"
id = "artifacts/nook"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 24675

[services.development]
run = "pnpm --filter @workspace/nook run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nook", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/nook", "run", "serve" ]

[services.env]
PORT = "24675"
BASE_PATH = "/"
